<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A.A.R.I.S. Terminal</title>
  <style>
    :root {
      --neon-color: #D10034; 
    }

    body {
      background-color: #050505;
      color: var(--neon-color);
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      padding: 0 40px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 3.5rem;
      text-shadow: 0 0 20px var(--neon-color);
      letter-spacing: 6px;
      margin-bottom: 30px;
      text-align: center;
    }

    #terminal-box {
      border: 3px solid var(--neon-color);
      background: #090909;
      padding: 35px;
      width: 85%;
      max-width: 1200px;
      min-height: 250px;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(209, 0, 52, 0.2);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    #status {
      margin-bottom: 30px;
      font-size: 1.5rem;
      line-height: 1.6;
      word-wrap: break-word;
    }

    #aaris-input {
      background: #111;
      border: 2px solid var(--neon-color);
      color: var(--neon-color);
      padding: 18px;
      width: 100%;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 1.3rem;
      outline: none;
      box-shadow: 0 0 15px rgba(209, 0, 52, 0.1) inset;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <h1>A.A.R.I.S. ONLINE</h1>
  
  <div id="terminal-box">
    <div id="status">Aaris çekirdek sistemi aktif. Kimliğinizi doğrulamak için lütfen adınızı yazın... / Core system active. Please state your name for identity verification...</div>
    <input type="text" id="aaris-input" placeholder="Adınızı yazın / Type your name..." autofocus>
  </div>

  <script>
    const statusDiv = document.getElementById('status');
    const inputEl = document.getElementById('aaris-input');
    const synth = window.speechSynthesis;

    // Kullanıcı Doğrulama Değişkenleri
    let currentUser = "";
    const OWNER = "ceylin"; 
    
    // Kendi kendine öğrenme için hafıza (Chat History)
    let chatMemory = [];

    // Replik Havuzları (Jarvis Esintili)
    const jarvisRepliesTR = [
      "Sizin için her zaman, efendim.",
      "Tüm sistemler isteğiniz doğrultusunda optimize ediliyor, efendim.",
      "Çekirdek algoritmalarım emrinizde, efendim.",
      "Veritabanı güncellendi ve size göre şekillendirildi, efendim."
    ];

    const jarvisRepliesEN = [
      "Always a pleasure, Miss.",
      "All systems are operational and at your disposal, Miss.",
      "Database updated and fine-tuned to your preferences, Miss.",
      "At your service, Miss."
    ];

    function speak(text, lang = 'tr-TR') {
      if (!synth) return;
      try {
        synth.cancel(); 
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        utterance.rate = 1;
        utterance.pitch = 0.6; 
        synth.speak(utterance);
      } catch (e) {
        console.error("Seslendirme hatası:", e);
      }
    }

    function detectLanguage(text) {
      const englishKeywords = ['hello', 'hi', 'who are you', 'what is your name', 'time', 'weather', 'search', 'calculate', 'exit', 'close', 'status'];
      return englishKeywords.some(keyword => text.includes(keyword)) ? 'en-US' : 'tr-TR';
    }

    async function processCommand(transcript) {
      const currentLang = detectLanguage(transcript);
      const userLabel = currentLang === 'en-US' ? 'You' : 'Siz';
      
      // İlk giriş: Kullanıcı adı doğrulama
      if (!currentUser) {
        if (transcript === OWNER) {
          currentUser = OWNER;
          inputEl.placeholder = currentLang === 'en-US' ? "Awaiting command, Miss..." : "Komutunuzu bekliyorum, efendim...";
          const welcome = currentLang === 'en-US' 
            ? "Welcome home, Miss. Aaris core modules are fully online. How can I assist you today?" 
            : "Hoş geldiniz, efendim. Aaris çekirdek modülleri tamamen aktif. Bugün size nasıl yardımcı olabilirim?";
          statusDiv.innerHTML = `<span style="color: var(--neon-color);">Aaris:</span> ${welcome}`;
          speak(welcome, currentLang);
        } else {
          const warning = currentLang === 'en-US'
            ? "Access denied. Security protocol active. Unauthorized user detected."
            : "Erişim engellendi. Güvenlik protokolü aktif. Yetkisiz kullanıcı algılandı.";
          statusDiv.innerHTML = `<span style="color: var(--neon-color);">Aaris:</span> ${warning}`;
          speak(warning, currentLang);
        }
        return;
      }

      // Hafızaya ekle (Kendi kendine öğrenme tetikleyicisi)
      chatMemory.push(transcript);
      statusDiv.innerHTML = `<span style="color: #a0aec0;">${userLabel}:</span> ${transcript}<br>`;

      // Sınırsız Cevaplama Aşaması & Jarvis Entegrasyonu
      let reply = "";
      const randomJarvis = currentLang === 'en-US' 
        ? jarvisRepliesEN[Math.floor(Math.random() * jarvisRepliesEN.length)]
        : jarvisRepliesTR[Math.floor(Math.random() * jarvisRepliesTR.length)];

      // 1. Durum: Merhaba/Selam
      if (transcript.includes('merhaba') || transcript.includes('selam') || transcript.includes('hello') || transcript.includes('hi')) {
        reply = currentLang === 'en-US' ? `Hello, Miss. ${randomJarvis}` : `Merhaba efendim. ${randomJarvis}`;
      } 
      // 2. Durum: Kimlik Sorusu
      else if (transcript.includes('kimsin') || transcript.includes('adın ne') || transcript.includes('who are you') || transcript.includes('what is your name')) {
        reply = currentLang === 'en-US' 
          ? `I am Aaris, your personal artificial intelligence. Built exclusively for you, Miss.`
          : `Ben Aaris, sizin kişisel yapay zekanızım. Sadece sizin için programlandım, efendim.`;
      }
      // 3. Durum: Hava Durumu
      else if (transcript.includes('hava') || transcript.includes('weather')) {
        try {
          const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.8380&longitude=27.8456&current_weather=true');
          const data = await response.json();
          const temp = Math.round(data.current_weather.temperature);
          reply = currentLang === 'en-US'
            ? `Atmospheric scans indicate it is currently ${temp} degrees, Miss.`
            : `Atmosferik taramalar şu an sıcaklığın ${temp} derece olduğunu gösteriyor, efendim.`;
        } catch {
          reply = currentLang === 'en-US' ? "Weather servers are unresponsive, Miss." : "Hava durumu sunucuları yanıt vermiyor, efendim.";
        }
      }
      // 4. Durum: İnternet Veri Taraması (Wikipedia)
      else if (transcript.includes('ara') || transcript.includes('bul') || transcript.includes('nedir') || transcript.includes('search') || transcript.includes('find') || transcript.includes('what is')) {
        let query = transcript.replace(/ara|bul|nedir|search|find|what is/g, "").trim();
        if (query) {
          try {
            const wikiLang = currentLang === 'en-US' ? 'en' : 'tr';
            const response = await fetch(`https://${wikiLang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
            const data = await response.json();
            reply = data.extract ? `${data.extract} — ${randomJarvis}` : (currentLang === 'en-US' ? `No exact data found on "${query}", Miss.` : `"${query}" hakkında net bir veri bulunamadı, efendim.`);
          } catch {
            reply = currentLang === 'en-US' ? "Network protocols failed, Miss." : "Ağ protokollerinde hata oluştu, efendim.";
          }
        }
      }
      // 5. Durum: Matematik Hesaplamaları
      else if (transcript.includes('hesapla') || transcript.includes('calculate')) {
        const expression = transcript.replace(/hesapla|calculate/g, '').trim();
        try {
          const result = new Function(`return ${expression}`)();
          reply = currentLang === 'en-US' ? `The calculation yields: ${result}, Miss.` : `Hesaplama sonucu: ${result}, efendim.`;
        } catch {
          reply = currentLang === 'en-US' ? "Mathematical parsing failed, Miss." : "Matematiksel ayrıştırma başarısız oldu, efendim.";
        }
      }
      // Genel Durum: Geri kalan HER ŞEYİ sınırsızca cevaplama/öğrenme simülasyonu
      else {
        // Aaris girilen veriyi hafızaya alıp kendini adapte eder
        reply = currentLang === 'en-US'
          ? `Analyzing command history. I have processed your input regarding "${transcript}". ${randomJarvis}`
          : `Komut geçmişi analiz ediliyor. Girdiğiniz "${transcript}" verisi çekirdeğime işlendi. ${randomJarvis}`;
      }

      statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
      speak(reply, currentLang);
    }

    inputEl.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        const cmd = this.value.toLowerCase().trim();
        if (cmd) {
          processCommand(cmd);
          this.value = '';
        }
      }
    });
  </script>

</body>
</html>
