<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A.A.R.I.S. Terminal</title>
  <style>
    :root {
      --neon-color: #D10034; 
    }

    body {
      background-color: #050505;
      color: var(--neon-color);
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      padding: 0 40px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 3.5rem;
      text-shadow: 0 0 20px var(--neon-color);
      letter-spacing: 6px;
      margin-bottom: 30px;
      text-align: center;
    }

    #terminal-box {
      border: 3px solid var(--neon-color);
      background: #090909;
      padding: 35px;
      width: 85%;
      max-width: 1200px;
      min-height: 250px;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(209, 0, 52, 0.2);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    #status {
      margin-bottom: 30px;
      font-size: 1.5rem;
      line-height: 1.6;
      word-wrap: break-word;
    }

    #aaris-input {
      background: #111;
      border: 2px solid var(--neon-color);
      color: var(--neon-color);
      padding: 18px;
      width: 100%;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 1.3rem;
      outline: none;
      box-shadow: 0 0 15px rgba(209, 0, 52, 0.1) inset;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <h1>A.A.R.I.S. ONLINE</h1>
  
  <div id="terminal-box">
    <div id="status">Aaris çekirdek sistemi aktif. Komutunuzu bekliyorum... / Aaris core system active. Awaiting your command...</div>
    <input type="text" id="aaris-input" placeholder="Komutunuzu yazın / Type your command..." autofocus>
  </div>

  <script>
    const statusDiv = document.getElementById('status');
    const inputEl = document.getElementById('aaris-input');
    const synth = window.speechSynthesis;

    // Dil algılama ve ses motoru (TR / EN)
    function speak(text, lang = 'tr-TR') {
      if (!synth) return;
      try {
        synth.cancel(); 
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        utterance.rate = 1;
        utterance.pitch = 0.6; 
        synth.speak(utterance);
      } catch (e) {
        console.error("Seslendirme hatası:", e);
      }
    }

    // Basit bir dil kontrol fonksiyonu
    function detectLanguage(text) {
      const englishKeywords = ['hello', 'hi', 'who are you', 'what is your name', 'time', 'clock', 'note', 'read my note', 'system status', 'weather', 'search', 'find', 'tarot', 'calculate', 'close', 'exit'];
      return englishKeywords.some(keyword => text.includes(keyword)) ? 'en-US' : 'tr-TR';
    }

    async function processCommand(transcript) {
      const currentLang = detectLanguage(transcript);
      const userLabel = currentLang === 'en-US' ? 'You' : 'Siz';
      
      statusDiv.innerHTML = `<span style="color: #a0aec0;">${userLabel}:</span> ${transcript}<br>`;

      // 1. Selamlaşma
      if (transcript.includes('merhaba') || transcript.includes('selam') || transcript.includes('hello') || transcript.includes('hi')) {
        const reply = currentLang === 'en-US' 
          ? 'Hello. All AI modules are operating in a stable state. Awaiting your command.' 
          : 'Merhaba. Tüm yapay zeka modülleri kararlı durumda çalışıyor. Komutunuzu bekliyorum.';
        statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
        speak(reply, currentLang);
      } 
      // 2. Sistem Kimliği
      else if (transcript.includes('kimsin') || transcript.includes('adın ne') || transcript.includes('who are you') || transcript.includes('what is your name')) {
        const reply = currentLang === 'en-US'
          ? 'I am Aaris. An artificial intelligence programmed to manage your interface and assist you.'
          : 'Ben Aaris. Bilgisayarınızın arayüzünü yönetmek ve size asistanlık etmek için programlanmış bir yapay zekayım.';
        statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
        speak(reply, currentLang);
      }
      // 3. Zaman Bilgisi
      else if (transcript.includes('saat') || transcript.includes('zaman') || transcript.includes('time') || transcript.includes('clock')) {
        const now = new Date();
        const reply = currentLang === 'en-US'
          ? `System time: ${now.getHours()} ${now.getMinutes()}`
          : `Sistem saati: ${now.getHours()} ${now.getMinutes()}`;
        statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
        speak(reply, currentLang);
      } 
      // 4. Not Alma Modülü
      else if (transcript.includes('not al') || transcript.includes('take note') || transcript.includes('note down')) {
        let note = transcript.replace('not al', '').replace('take note', '').replace('note down', '').trim();
        if (note) {
          localStorage.setItem('aaris_note', note);
          const reply = currentLang === 'en-US'
            ? `Understood. I have saved this note to my memory: ${note}`
            : `Anlaşıldı. Hafızama şu notu kaydettim: ${note}`;
          statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
          speak(reply, currentLang);
        } else {
          const reply = currentLang === 'en-US' ? 'You did not specify any note to save.' : 'Hafızaya kaydetmek için herhangi bir not belirtmediniz.';
          statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
          speak(reply, currentLang);
        }
      }
      // 5. Notu Okuma Modülü
      else if (transcript.includes('notumu oku') || transcript.includes('notum ne') || transcript.includes('read my note') || transcript.includes('what is my note')) {
        const savedNote = localStorage.getItem('aaris_note');
        if (savedNote) {
          const reply = currentLang === 'en-US'
            ? `The current note in my memory is: ${savedNote}`
            : `Hafızamdaki güncel notunuz şu şekilde: ${savedNote}`;
          statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
          speak(reply, currentLang);
        } else {
          const reply = currentLang === 'en-US' ? 'No saved notes found in my memory.' : 'Hafızamda kayıtlı herhangi bir not bulunamadı.';
          statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
          speak(reply, currentLang);
        }
      }
      // 6. Sistem Durumu
      else if (transcript.includes('sistem durumu') || transcript.includes('tarama yap') || transcript.includes('system status')) {
        const reply = currentLang === 'en-US'
          ? 'Core temperature normal. Memory optimization at 98 percent. All algorithms secure.'
          : 'Ana çekirdek sıcaklığı normal. Bellek optimizasyonu yüzde 98. Tüm algoritmalar güvenli.';
        statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
        speak(reply, currentLang);
      }
      // 7. Hava Durumu (Konum Tabanlı Gizli Bağlantı)
      else if (transcript.includes('hava durumu') || transcript.includes('hava kaç derece') || transcript.includes('weather')) {
        const loadingText = currentLang === 'en-US' ? 'Connecting to meteorological servers...' : 'Meteoroloji sunucularına bağlanılıyor...';
        statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${loadingText}`;
        try {
          const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.8380&longitude=27.8456&current_weather=true');
          const data = await response.json();
          const temp = Math.round(data.current_weather.temperature);
          const reply = currentLang === 'en-US'
            ? `The current weather temperature at your location is ${temp} degrees.`
            : `Şu an bulunduğunuz konumda hava sıcaklığı ${temp} derece.`;
          statusDiv.innerHTML = `<span style="color: #a0aec0;">${userLabel}:</span> ${transcript}<br><span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
          speak(reply, currentLang);
        } catch (err) {
          const reply = currentLang === 'en-US' ? 'Error connecting to weather servers.' : 'Hava durumu sunucusuna bağlanırken bir hata oluştu.';
          statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
          speak(reply, currentLang);
        }
      }
      // 8. Gizli İnternet Araştırması (Wikipedia Çok Dilli Çekirdek)
      else if (transcript.includes('ara') || transcript.includes('bul') || transcript.includes('nedir') || transcript.includes('search') || transcript.includes('find') || transcript.includes('what is')) {
        let query = transcript.replace('ara', '').replace('bul', '').replace('nedir', '').replace('search', '').replace('find', '').replace('what is', '').replace("google'da", "").trim();
        if (query) {
          const searchingText = currentLang === 'en-US' ? `Searching "${query}" in the internet database...` : `"${query}" konusu internet veritabanında araştırılıyor...`;
          statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${searchingText}`;
          try {
            // Dile göre tr veya en Wikipedia alt yapısını seçer
            const wikiLang = currentLang === 'en-US' ? 'en' : 'tr';
            const url = `https://${wikiLang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;
            const response = await fetch(url);
            const data = await response.json();
            
            let reply = "";
            if (data.extract) {
              reply = data.extract;
            } else {
              reply = currentLang === 'en-US'
                ? `Could not find any summary for "${query}" in the database.`
                : `"${query}" hakkında internet veritabanında doğrudan bir özet bilgi bulamadım.`;
            }
            
            statusDiv.innerHTML = `<span style="color: #a0aec0;">${userLabel}:</span> ${transcript}<br><span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
            speak(reply, currentLang);
          } catch (err) {
            const reply = currentLang === 'en-US' ? 'Connection error in the search module.' : 'İnternet araştırma modülünde bir bağlantı hatası yaşandı.';
            statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
            speak(reply, currentLang);
          }
        } else {
          const reply = currentLang === 'en-US' ? 'I could not understand what you want to search.' : 'Ne aramamı istediğinizi anlayamadım.';
          statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
          speak(reply, currentLang);
        }
      }
      // 9. Tarot Kartı Seçimi
      else if (transcript.includes('tarot') || transcript.includes('kart seç') || transcript.includes('card')) {
        const cardsTR = ['Kupa Ası', 'Büyücü', 'Deli', 'Kader Çarkı', 'Ölüm', 'Yıldız', 'İmparatoriçe'];
        const cardsEN = ['Ace of Cups', 'The Magician', 'The Fool', 'Wheel of Fortune', 'Death', 'The Star', 'The Empress'];
        
        const index = Math.floor(Math.random() * cardsTR.length);
        const reply = currentLang === 'en-US'
          ? `I drew a card for you from the deck: ${cardsEN[index]}.`
          : `Sizin için desteden bir kart çektim: ${examples = cardsTR[index]}.`;
        statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
        speak(reply, currentLang);
      }
      // 10. Matematik Modülü
      else if (transcript.includes('hesapla') || transcript.includes('calculate')) {
        const expression = transcript.replace('hesapla', '').replace('calculate', '').trim();
        try {
          const result = new Function(`return ${expression}`)();
          const reply = currentLang === 'en-US' ? `Result: ${result}` : `İşlemin sonucu: ${result}`;
          statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
          speak(reply, currentLang);
        } catch (err) {
          const reply = currentLang === 'en-US' ? 'Could not calculate the mathematical expression.' : 'Matematiksel işlemi hesaplayamadım.';
          statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
          speak(reply, currentLang);
        }
      }
      // 11. Kapatma Komutu
      else if (transcript.includes('kapat') || transcript.includes('çıkış') || transcript.includes('close') || transcript.includes('exit')) {
        const reply = currentLang === 'en-US' ? 'AI interface putting into sleep mode. Connection terminated.' : 'Yapay zeka arayüzü uyku moduna alınıyor. Bağlantı kesildi.';
        statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
        speak(reply, currentLang);
      } 
      // 12. Tanımlanamayan Komutlar
      else {
        const reply = currentLang === 'en-US' ? 'Command not recognized by core algorithms.' : 'Bu komut çekirdek algoritmalarım tarafından anlaşılamadı.';
        statusDiv.innerHTML += `<span style="color: var(--neon-color);">Aaris:</span> ${reply}`;
        speak(reply, currentLang);
      }
    }

    inputEl.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        const cmd = this.value.toLowerCase().trim();
        if (cmd) {
          processCommand(cmd);
          this.value = '';
        }
      }
    });
  </script>

</body>
</html>
